---
# renovate: datasource=docker depName=ghcr.io/siderolabs/imager
talosVersion: v1.13.7
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.2

clusterName: "kantai"
endpoint: https://k8s.kantai.xyz:6443
clusterPodNets:
  - "10.11.0.0/16"
  - "${CLUSTER_POD_V6_CIDR}"
clusterSvcNets:
  - "10.12.0.0/16"
  - "${CLUSTER_SVC_V6_CIDR}"
additionalApiServerCertSans: &sans
  - "k8s.kantai.xyz"
  - "10.10.10.10"
  - "127.0.0.1" # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

imageFactory:
  registryURL: tif.etincelle.cloud

nodes:
  - hostname: "kantai1"
    ipAddress: "10.1.1.1"
    installDiskSelector:
      wwid: eui.e8238fa6bf530001001b448b4a49b465
    controlPlane: true
    kernelModules:
      - name: nvidia
      - name: nvidia-uvm
      - name: nvidia-modeset
      - name: nvme-tcp
      - name: vfio-pci
      - name: vhost_net
      - name: vhost_vsock
    machineSpec:
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0f0np0
        dhcp: true
        mtu: 1500
      - interface: enp1s0f1np1
        ignore: true
      - interface: enp66s0f0
        ignore: true
      - interface: enp66s0f1
        ignore: true
    nodeLabels:
      secureboot.kantai.xyz: "true"
      node.kantai.xyz/high-cpu: "true"
    schematic:
      customization:
        bootloader: sd-boot
        extraKernelArgs:
          - -selinux
          - lsm=landlock,lockdown,yama,apparmor,bpf
          - lsm.debug
          - amd_pstate=active
          - spec_rstack_overflow=microcode
          - zfs.zfs_arc_max=26843545600
          - zfs.zfs_arc_shrinker_limit=0
        secureboot:
          includeWellKnownCertificates: true
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/kata-containers
            - siderolabs/nvidia-container-toolkit-production
            - siderolabs/nvidia-gdrdrv-device
            - siderolabs/nvidia-open-gpu-kernel-modules-production
            - siderolabs/util-linux-tools
            - siderolabs/zfs
    patches:
      # sysctls
      - |-
        machine:
          sysctls:
            net.core.bpf_jit_harden: "1"
            net.ipv6.conf.all.accept_ra: "2"
            net.ipv6.conf.all.forwarding: "1"
            net.ipv6.conf.enp1s0f0np0.accept_ra: "2"
            net.ipv6.conf.enp1s0f0np0.forwarding: "1"
            vm.nr_hugepages: "2048"

      # Encrypt EPHEMERAL and STATE volumes
      - |-
        machine:
          systemDiskEncryption:
            ephemeral:
              provider: luks2
              keys:
                - slot: 0
                  tpm:
                    checkSecurebootStatusOnEnroll: true
              options:
                - no_read_workqueue
                - no_write_workqueue
            state:
              provider: luks2
              keys:
                - slot: 0
                  tpm:
                    checkSecurebootStatusOnEnroll: true
              options:
                - no_read_workqueue
                - no_write_workqueue

  - hostname: "kantai2"
    ipAddress: "10.1.1.2"
    installDiskSelector:
      size: "> 50GB"
    controlPlane: true
    kernelModules:
      - name: nvme-tcp
    machineSpec:
      arch: arm64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp0s1
        dhcp: true
        mtu: 1500
    nodeLabels:
      secureboot.kantai.xyz: "true"
    schematic:
      customization:
        bootloader: sd-boot
        extraKernelArgs:
          - -selinux
          - lsm=landlock,lockdown,yama,apparmor,bpf
          - lsm.debug
        systemExtensions:
          officialExtensions:
            - siderolabs/util-linux-tools
    nodeTaints:
      node-role.kubernetes.io/control-plane: :PreferNoSchedule
      node.kantai.xyz/low-memory: :PreferNoSchedule
    patches:
      # sysctls
      - |-
        machine:
          sysctls:
            net.core.bpf_jit_harden: "1"
            net.ipv6.conf.all.accept_ra: "2"
            net.ipv6.conf.all.forwarding: "1"
            net.ipv6.conf.enp0s1.accept_ra: "2"
            net.ipv6.conf.enp0s1.forwarding: "1"
            vm.nr_hugepages: "1024"

  - hostname: "kantai3"
    ipAddress: "10.1.1.3"
    installDiskSelector:
      wwid: eui.0025385691b1844a
    controlPlane: true
    kernelModules:
      - name: nvme-tcp
      - name: vfio-pci
      - name: vhost_net
      - name: vhost_vsock
    machineSpec:
      arch: amd64
      secureboot: false
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        dhcp: true
        mtu: 1500
    nodeTaints:
      node-role.kubernetes.io/control-plane: :PreferNoSchedule
    schematic:
      customization:
        bootloader: sd-boot
        extraKernelArgs:
          - -selinux
          - lsm=landlock,lockdown,yama,apparmor,bpf
          - lsm.debug
          - amd_pstate=active
          - spec_rstack_overflow=microcode
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/kata-containers
            - siderolabs/util-linux-tools
    patches:
      # sysctls
      - |-
        machine:
          sysctls:
            net.core.bpf_jit_harden: "1"
            net.ipv6.conf.all.accept_ra: "2"
            net.ipv6.conf.all.forwarding: "1"
            net.ipv6.conf.enp1s0.accept_ra: "2"
            net.ipv6.conf.enp1s0.forwarding: "1"
            vm.nr_hugepages: "2048"

patches:
  # Disable search domain everywhere
  - |-
    machine:
      network:
        disableSearchDomain: true

  # Use etincelle discovery-service.
  # The previous Kubernetes discovery service is deprecated due to security changes in Kubernetes.
  # https://www.talos.dev/v1.10/talos-guides/discovery/#registries
  # https://github.com/siderolabs/talos/issues/9980
  - |-
    cluster:
      discovery:
        enabled: true
        registries:
          kubernetes:
            disabled: true
          service:
            disabled: false
            endpoint: https://ds.etincelle.cloud/

  # Configure kubelet
  - |-
    machine:
      kubelet:
        defaultRuntimeSeccompProfileEnabled: true
        extraConfig:
          imageGCHighThresholdPercent: 85
          imageGCLowThresholdPercent: 65
          maxParallelImagePulls: 10
          maxPods: 400
          serializeImagePulls: false
          serverTLSBootstrap: true
          shutdownGracePeriod: 5m
          shutdownGracePeriodCriticalPods: 2m
        nodeIP:
          validSubnets:
            - 10.1.1.0/24
            - ${CLUSTER_NODE_V6_CIDR}

  # Common sysctl settings
  # https://www.kernel.org/doc/Documentation/networking/ip-sysctl.txt
  # https://fasterdata.es.net/host-tuning/linux/
  # https://blog.cloudflare.com/http-2-prioritization-with-nginx/
  # https://www.geeksforgeeks.org/computer-networks/what-is-tcp-fast-open/
  - |-
    machine:
      sysctls:
        fs.inotify.max_queued_events: "65536"
        fs.inotify.max_user_watches: "1048576"
        fs.inotify.max_user_instances: "8192"
        net.core.rmem_max: "67108864"              # 64 MiB; QUIC and 10 Gbps
        net.core.wmem_max: "67108864"              # 64 MiB; QUIC and 10 Gbps
        net.ipv4.tcp_rmem: 4096 131072 33554432    # 1K, 128K, 32M; QUIC and 10 Gbps
        net.ipv4.tcp_wmem: 4096 131072 33554432    # 1K, 128K, 32M; QUIC and 10 Gbps
        net.ipv4.ping_group_range: "0 2147483647"  # Allow all groups to ping
        net.core.default_qdisc: fq                 # Fair Queue, don't use codel with bbr
        net.ipv4.tcp_congestion_control: bbr
        net.ipv4.tcp_fastopen: "3"                 # Enable TFO for both client and server
        net.ipv4.tcp_mtu_probing: "1"              # Disabled by default, enabled when an ICMP black hole detected
        net.ipv4.tcp_notsent_lowat: "16384"        # 16K
        net.ipv4.tcp_slow_start_after_idle: "0"    # Disable RFC2861 slow start after idle
        user.max_user_namespaces: "49152"          # C000; arbitrary

  # Extra mounts for openebs-hostpath and local zfs datasets
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/mnt
            type: bind
            source: /var/mnt
            options: [bind, rshared, rw]
          - destination: /var/openebs/local
            type: bind
            source: /var/openebs/local
            options: [bind, rshared, rw]

  # Enable Host DNS: https://www.talos.dev/v1.8/talos-guides/network/host-dns/
  - |-
    machine:
      features:
        hostDNS:
          enabled: true
          resolveMemberNames: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false

  # Use GCR mirror for Docker Hub
  # NOTE: Incompatible with Spegel, remove once Spegel can be used again.
  # - |-
  #   machine:
  #     registries:
  #       mirrors:
  #         docker.io:
  #           endpoints:
  #             - https://mirror.gcr.io

  # containerd config
  # - discard_unpacked_layers (spegel, https://spegel.dev/docs/getting-started/#talos)
  # - enable_unprivileged_ports, enable_unprivileged_icmp (convenience, https://github.com/kubernetes/kubernetes/issues/102612)
  # - cgroup_writable (buildkit, https://github.com/containerd/containerd/pull/11131, planned for containerd 2.1)
  - |-
    machine:
      files:
        - op: create
          path: /etc/cri/conf.d/20-customization.part
          content: |-
            [plugins.'io.containerd.cri.v1.images']
              discard_unpacked_layers = false
            [plugins."io.containerd.cri.v1.runtime"]
              enable_cdi = true
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
            [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc]
              cgroup_writable = true

controlPlane:
  patches:
    # Cluster configuration
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
            node-cidr-mask-size-ipv6: "108"
            terminated-pod-gc-threshold: "100"
        coreDNS:
          disabled: true
        proxy:
          disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

    # ETCD configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
          advertisedSubnets:
            - 10.1.1.0/24

    # api-server configuration
    - |-
      cluster:
        apiServer:
          extraArgs:
            disable-admission-plugins: PodSecurity
            enable-aggregator-routing: true
            oidc-client-id: 287821e5-f31e-4073-9b2c-c30775e9fee6
            oidc-issuer-url: https://pid.kantai.xyz
            oidc-username-claim: email

    # Feature gates
    - |-
      cluster:
        apiServer:
          extraArgs:
            feature-gates: DRANodeAllocatableResources=true,DRAResourcePoolStatus=true,DRAWorkloadResourceClaims=true,GangScheduling=true,GenericWorkload=true,PodCertificateRequest=true,TopologyAwareWorkloadScheduling=true,WorkloadAwarePreemption=true,WorkloadWithJob=true
            runtime-config: certificates.k8s.io/v1beta1/podcertificaterequests=true,scheduling.k8s.io/v1alpha2=true
        controllerManager:
          extraArgs:
            feature-gates: DRANodeAllocatableResources=true,DRAResourcePoolStatus=true,DRAWorkloadResourceClaims=true,GangScheduling=true,GenericWorkload=true,PodCertificateRequest=true,TopologyAwareWorkloadScheduling=true,WorkloadAwarePreemption=true,WorkloadWithJob=true
        scheduler:
          extraArgs:
            feature-gates: DRANodeAllocatableResources=true,DRAResourcePoolStatus=true,DRAWorkloadResourceClaims=true,GangScheduling=true,GenericWorkload=true,PodCertificateRequest=true,TopologyAwareWorkloadScheduling=true,WorkloadAwarePreemption=true,WorkloadWithJob=true
      machine:
        kubelet:
          extraConfig:
            featureGates:
              DRANodeAllocatableResources: true
              DRAResourcePoolStatus: true
              DRAWorkloadResourceClaims: true
              GangScheduling: true
              GenericWorkload: true
              PodCertificateRequest: true
              TopologyAwareWorkloadScheduling: true
              WorkloadAwarePreemption: true
              WorkloadWithJob: true

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:admin
              - os:etcd:backup
            allowedKubernetesNamespaces:
              - talos-admin
