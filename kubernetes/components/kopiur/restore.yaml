---
# yaml-language-server: $schema=https://crd.kantai.xyz/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: "${APP}-restore"
spec:
  credentialProjection:
    enabled: true
  source:
    fromPolicy:
      name: "${APP}"
      offset: 0
  policy:
    onMissingSnapshot: Continue
  target:
      populator: {}
