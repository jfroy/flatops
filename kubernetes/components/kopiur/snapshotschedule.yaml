---
# yaml-language-server: $schema=https://crd.kantai.xyz/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: "${APP}"
spec:
  failedJobsHistoryLimit: 3
  policyRef:
    name: "${APP}"
  schedule:
    concurrencyPolicy: Forbid
    cron: "H 2 * * *"
    jitter: 2m
    runOnCreate: false
