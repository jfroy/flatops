---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-operator-mcp
---
# yaml-language-server: $schema=https://crd.kantai.xyz/rbac.authorization.k8s.io/clusterrole_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-operator-mcp-readonly
rules:
  # The MCP server runs with --read-only; grant cluster-wide read of every
  # resource (incl. subresources like pods/log) and non-resource URLs so its
  # query tools work against Flux objects and the workloads they manage.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
# yaml-language-server: $schema=https://crd.kantai.xyz/rbac.authorization.k8s.io/clusterrolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-operator-mcp-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-operator-mcp-readonly
subjects:
  - kind: ServiceAccount
    name: flux-operator-mcp
    namespace: mcp
