---
# yaml-language-server: $schema=https://crd.kantai.xyz/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: openebs-localpv
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.5.1
  url: oci://ghcr.io/openebs/charts/localpv-provisioner
---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs-localpv
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openebs-localpv
  values:
    global:
      imageRegistry: quay.io/
    localpv:
      basePath: /var/openebs/local
    hostpathClass:
      name: openebs-hostpath
    analytics:
      enabled: false
