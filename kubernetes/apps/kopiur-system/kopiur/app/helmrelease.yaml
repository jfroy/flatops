---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kopiur
  values:
    features:
      credentialProjection:
        enabled: true
    installScope: cluster
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
      prometheusRule:
        enabled: true
      serviceMonitor:
        enabled: true
    webhook:
      certManager:
        issuerRef:
          name: cluster-ca
          kind: ClusterIssuer
          group: cert-manager.io
      serviceMonitor:
        enabled: true
      tls:
        mode: cert-manager
