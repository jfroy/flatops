---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 1h
  chart:
    spec:
      chart: ./deploy/helm/kopiur
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: kopiur
  values:
    installCRDs: true
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
    webhook:
      certManager:
        enabled: true
