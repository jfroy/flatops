---
# yaml-language-server: $schema=https://crd.kantai.xyz/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: kopiur-r2
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      auth:
        secretRef:
          name: kopiur-r2
          namespace: kopiur-system
      bucket: kantai-kopiur-1
      endpoint: 2e8a5ea1691a53a5843e2eb2ef6dddeb.r2.cloudflarestorage.com
      prefix: ""
  create:
    enabled: true
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-r2
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  identityDefaults:
    hostnameExpr: "namespace"
    usernameExpr: "namespace + '-' + policyName"
