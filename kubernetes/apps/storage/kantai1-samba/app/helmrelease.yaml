---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kantai1-samba
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      kantai1-samba:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1 # do not scale up
        containers:
          smbd:
            image:
              repository: ghcr.io/jfroy/samba
              tag: 4.24.4@sha256:96a97462121977ff8c378b1a2114ad7070bc1bd0b97f14877b2b010cdedc95a5
            env:
              SAMBA_CONTAINER_ID: default
              SAMBA_SPECIFICS: daemon_cli_debug_output
              SAMBACC_CONFIG: /config/config.yaml:/config/users.json
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - DAC_READ_SEARCH
                  - FOWNER
                  - FSETID
                  - IPC_LOCK
                  - NET_BIND_SERVICE
                  - SETGID
                  - SETPCAP
                  - SETUID
                  - SYS_RESOURCE
              # NOTE: io_uring is blocked by the default containerd v2 seccomp profile
              # https://github.com/containerd/containerd/pull/9320
              seccompProfile: { type: Unconfined }
        initContainers:
          avahi:
            dependsOn:
              - dbus
            image:
              repository: ghcr.io/jfroy/avahi
              tag: "0.8"
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add:
                  - CHOWN
                  - NET_BIND_SERVICE
              seccompProfile: { type: RuntimeDefault }
          dbus:
            image:
              repository: ghcr.io/jfroy/dbus-daemon
              tag: 1.16.2@sha256:d02b4525749f24bb9c92cba54ba7600af08920a58280c22de2ffbe649b1e3cdb
            args:
              - --config-file
              - /config/dbus.conf
            dependsOn:
              - setup
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile: { type: RuntimeDefault }
          setup:
            image:
              repository: docker.io/library/alpine
              tag: latest
            command: [/bin/sh, -c, mkdir -p /run/dbus]
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile: { type: RuntimeDefault }
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "multus-ipv4",
            "namespace": "kube-system",
            "ips": ["10.1.2.4/16"]
          }]
      shareProcessNamespace: true
    persistence:
      config-avahi:
        type: configMap
        name: kantai1-avahi
        advancedMounts:
          kantai1-samba:
            avahi:
              - path: /etc/avahi
                readOnly: true
      config-dbus:
        type: configMap
        name: kantai1-dbus
        advancedMounts:
          kantai1-samba:
            dbus:
              - path: /config
                readOnly: true
      config-dbus-system-d:
        type: configMap
        name: kantai1-dbus-system-d
        advancedMounts:
          kantai1-samba:
            dbus:
              - path: /config/system.d
                readOnly: true
      config-samba:
        type: custom
        volumeSpec:
          projected:
            sources:
              - configMap:
                  name: kantai1-samba
                  items:
                    - key: config.yaml
                      path: config.yaml
              - secret:
                  name: kantai1-samba
                  items:
                    - key: users.json
                      path: users.json
        advancedMounts:
          kantai1-samba:
            smbd:
              - path: /config
                readOnly: true
      lock:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /var/lock
      log:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /var/log/samba
      media1:
        type: persistentVolumeClaim
        existingClaim: media1
        advancedMounts:
          kantai1-samba:
            smbd:
              - path: /media1
      media2:
        type: persistentVolumeClaim
        existingClaim: media2
        advancedMounts:
          kantai1-samba:
            smbd:
              - path: /media2
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /run
          - path: /var/run
      tmp:
        type: emptyDir
        sizeLimit: 1Gi
