---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media1
  finalizers:
    - cluster.local/data-protection
spec:
  capacity:
    storage: 246Ti
  accessModes:
    - ReadWriteOnce
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /var/mnt/reservoir/media1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kantai1
