---
fullnameOverride: coredns
image:
  repository: mirror.gcr.io/coredns/coredns
replicaCount: 2
k8sAppLabelOverride: kube-dns
serviceAccount:
  create: true
service:
  name: kube-dns
  clusterIP: "10.12.0.10"
  clusterIPs: # By default Talos sets kubelet clusterDNS to the 10th address of every service CIDR.
    - "10.12.0.10"
  ipFamilyPolicy: SingleStack
servers:
  - zones:
      - zone: .
        scheme: dns://
        use_tcp: true
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 5s
      - name: ready
      # Resolve virtual-host-style S3 (<bucket>.s3.kantai.xyz) to the in-cluster
      # RGW ClusterIP so apps that only support vhost addressing reach object
      # storage without hairpinning through the LoadBalancer IP.
      - name: rewrite
        parameters: stop
        configBlock: |-
          name regex (.*)\.s3\.kantai\.xyz\.?$ rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
          answer auto
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods verified
          fallthrough in-addr.arpa ip6.arpa
      - name: autopath
        parameters: "@kubernetes"
      - name: forward
        parameters: . /etc/resolv.conf
      - name: cache
        configBlock: |-
          prefetch 20
          serve_stale
      - name: loop
      - name: reload
      - name: loadbalance
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: log
        configBlock: |-
          class error
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
