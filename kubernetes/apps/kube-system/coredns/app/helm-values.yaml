---
fullnameOverride: coredns
image:
  repository: mirror.gcr.io/coredns/coredns
replicaCount: 2
k8sAppLabelOverride: kube-dns
serviceAccount:
  create: true
service:
  name: kube-dns
  clusterIP: "10.12.0.10"
  clusterIPs: # By default Talos sets kubelet clusterDNS to the 10th address of every service CIDR.
    - "10.12.0.10"
  ipFamilyPolicy: SingleStack
servers:
  - zones:
      - zone: .
        scheme: dns://
        use_tcp: true
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 5s
      - name: ready
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods verified
          fallthrough in-addr.arpa ip6.arpa
      # autopath is intentionally omitted. It answers the first search-domain
      # form of a query (e.g. <name>.default.svc.cluster.local) by resolving
      # the bare name via forward/upstream. That would bypass the dedicated
      # s3.kantai.xyz zone block below.
      - name: forward
        parameters: . /etc/resolv.conf
      - name: cache
        configBlock: |-
          prefetch 20
          serve_stale
      - name: loop
      - name: reload
      - name: loadbalance
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: log
        configBlock: |-
          class error
  # Authoritative in-cluster zone for S3 object storage. Both the apex
  # (s3.kantai.xyz, path-style) and <bucket>.s3.kantai.xyz (virtual-host style)
  # are rewritten to the S3 service and answered by the kubernetes plugin.
  # There is deliberately no forward so queries cannot leave the cluster.
  - zones:
      - zone: s3.kantai.xyz
        scheme: dns://
        use_tcp: true
    port: 53
    plugins:
      - name: errors
      - name: rewrite
        parameters: stop
        configBlock: |-
          name regex (.*\.)?s3\.kantai\.xyz\.?$ rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
          answer auto
      - name: kubernetes
        parameters: cluster.local
        configBlock: |-
          pods verified
      - name: cache
      - name: log
        configBlock: |-
          class error
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
