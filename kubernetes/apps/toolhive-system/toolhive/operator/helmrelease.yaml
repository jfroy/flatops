---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: toolhive-operator
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.30.1
  url: oci://ghcr.io/stacklok/toolhive/toolhive-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-operator
spec:
  chartRef:
    kind: OCIRepository
    name: toolhive-operator
  interval: 1h
  values:
    operator:
      replicaCount: 1
      # Chart sets GOMEMLIMIT=150MiB; default limit 128Mi is lower → OOMKilled. Raise limit so runtime stays under cgroup.
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 256Mi
