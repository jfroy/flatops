---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-dns
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: k8s-gateway
  values:
    domain: kantai.xyz
    ttl: 1
    service:
      ipFamily: IPv4
      ipFamilyPolicy: SingleStack
      loadBalancerClass: tailscale
      port: 53
      type: LoadBalancer
    watchedResources: ["HTTPRoute"]
