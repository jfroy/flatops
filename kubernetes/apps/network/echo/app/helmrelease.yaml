---
# yaml-language-server: $schema=https://crd.kantai.xyz/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: echo
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.1.2
  url: oci://ghcr.io/home-operations/charts/echo
---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  chartRef:
    kind: OCIRepository
    name: echo
  interval: 1h
  values:
    replicaCount: 2
    config:
      kubernetes: true
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          group: external
          conditions: ["[STATUS] == 200"]
      hostnames:
        - "{{ .Release.Name }}.kantai.xyz"
      parentRefs:
        - name: envoy-external
          namespace: network
        - name: envoy-internal
          namespace: network
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
