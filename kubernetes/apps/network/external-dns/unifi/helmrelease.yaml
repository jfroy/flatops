---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-unifi
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
  upgrade:
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
  values:
    fullnameOverride: *app
    domainFilters: ["kantai.xyz", "internal"]
    extraArgs:
      - --gateway-name=envoy-internal
    logLevel: debug
    podAnnotations:
      secret.reloader.stakater.com/reload: external-dns-unifi
    policy: sync
    serviceMonitor:
      enabled: true
    sources: ["gateway-httproute", "service"]
    triggerLoopOnEvent: true
    txtOwnerId: kantai
    txtPrefix: edns.
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.3@sha256:0ec913960e467bf726a781d4f5a88f17212cd3a268dc3ef35606794154e8f93d
        env:
          - name: UNIFI_HOST
            value: https://unifi.internal
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-unifi
                key: UNIFI_API_KEY
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
