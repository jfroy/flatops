---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app edns-unifi
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: external-dns
  values:
    fullnameOverride: *app
    extraArgs:
      - --gateway-label-filter=external-dns.kantai.xyz/unifi
    logLevel: debug
    podAnnotations:
      secret.reloader.stakater.com/reload: external-dns-unifi
    policy: sync
    serviceMonitor:
      enabled: true
    sources: ["gateway-httproute", "service"]
    triggerLoopOnEvent: true
    txtOwnerId: unifi
    txtPrefix: edns.
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.8@sha256:573ac443ea24b1769a3339a5252d06ed79ea4c1041a6172e7df218ecad3a583a
        env:
          - name: UNIFI_HOST
            value: https://unifi.internal
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-unifi
                key: UNIFI_API_KEY
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
