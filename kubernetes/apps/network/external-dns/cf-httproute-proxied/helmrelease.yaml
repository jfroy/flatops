---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app edns-cf-httproute-proxied
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: external-dns
  values:
    fullnameOverride: *app
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare-secret
            key: api-token
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --cloudflare-proxied
      - --default-targets=external.kantai.xyz
      - --gateway-label-filter=external-dns.kantai.xyz/cloudflare-proxied
    podAnnotations:
      secret.reloader.stakater.com/reload: external-dns-cloudflare-secret
    policy: sync
    serviceMonitor:
      enabled: true
    sources: ["gateway-httproute"]
    triggerLoopOnEvent: true
    txtOwnerId: cf-httproute-proxied
    txtPrefix: edns.
    provider:
      name: cloudflare
