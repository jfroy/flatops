---
# yaml-language-server: $schema=https://crd.kantai.xyz/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cloudflared
  labels:
    external-dns.kantai.xyz/cloudflare-proxied: "true"
spec:
  endpoints:
    - dnsName: "external.kantai.xyz"
      recordType: CNAME
      targets: ["${TUNNEL_ID}.cfargotunnel.com"]
