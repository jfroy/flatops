---
# yaml-language-server: $schema=https://crd.kantai.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: idrac-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: idrac-exporter
    template:
      templateFrom:
      - target: Data
        configMap:
          name: idrac-exporter-tpl
          items:
          - key: idrac.yml
            templateAs: Values
  dataFrom:
    - extract:
        key: kantai1-redfish
      rewrite:
        - regexp:
            source: "(.*)"
            target: "kantai1_$1"
