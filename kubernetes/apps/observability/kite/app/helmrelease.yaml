---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kite-chart
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.11.0
  url: oci://ghcr.io/kite-org/charts/kite
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kite
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kite-chart
  values:
    host: https://kite.kantai.xyz
    db:
      type: postgres
    secret:
      create: false
      existingSecret: kite
    config:
      enabled: true
      existingSecret: kite-config
    extraEnvs:
      - name: DB_TYPE
        value: postgres
      - name: OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: kite-oidc
            key: OIDC_CLIENT_SECRET
    podAnnotations:
      reloader.stakater.com/auto: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
    volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 128Mi
      - name: run
        emptyDir:
          medium: Memory
          sizeLimit: 1Mi
    volumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: run
        mountPath: /run
    gateway:
      enabled: true
      create: false
      name: envoy-internal
      namespace: network
      httpRoutes:
        - name: kite
          hostnames: ["kite.kantai.xyz"]
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              timeouts:
                request: "120s"
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: kite
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: init-db
                    image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
                    envFrom:
                      - secretRef:
                          name: kite
                      - secretRef:
                          name: kite-initdb
