---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kite
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kite-chart
  values:
    host: https://kite.kantai.xyz
    db:
      type: postgres
    secret:
      create: false
      existingSecret: kite
    config:
      enabled: true
      existingSecret: kite-config
    extraEnvs:
      - name: DB_TYPE
        value: postgres
      - name: OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: kite-oidc
            key: OIDC_CLIENT_SECRET
    podAnnotations:
      reloader.stakater.com/auto: "true"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
    volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 128Mi
      - name: run
        emptyDir:
          medium: Memory
          sizeLimit: 1Mi
    volumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: run
        mountPath: /run
    gateway:
      enabled: true
      create: false
      name: envoy-internal
      namespace: network
      httpRoutes:
        - name: kite
          hostnames: ["kite.kantai.xyz"]
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              timeouts:
                request: "120s"
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: kite
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: init-db
                    image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
                    envFrom:
                      - secretRef:
                          name: kite
                      - secretRef:
                          name: kite-initdb
