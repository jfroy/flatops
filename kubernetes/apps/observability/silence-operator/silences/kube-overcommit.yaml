---
# yaml-language-server: $schema=https://crd.kantai.xyz/monitoring.giantswarm.io/silence_v1alpha1.json
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
metadata:
  name: kube-overcommit
spec:
  matchers:
    - name: alertname
      value: Kube(CPU|Memory)Overcommit
      isRegex: true
