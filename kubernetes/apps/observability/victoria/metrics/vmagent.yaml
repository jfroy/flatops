---
# yaml-language-server: $schema=https://crd.kantai.xyz/operator.victoriametrics.com/vmagent_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: kantai
spec:
  extraArgs:
    opentelemetry.usePrometheusNaming: "true"
    promscrape.maxScrapeSize: "33554432" # 32MB
  remoteWrite:
    - url: "http://vmsingle-kantai.observability.svc:8428/api/v1/write"
  remoteWriteSettings:
    label:
      cluster: kantai
  selectAllByDefault: true
