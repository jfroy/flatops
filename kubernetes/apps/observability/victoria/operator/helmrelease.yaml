---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-operator
  labels:
    kantai.xyz/no-hr-defaults: "true"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-operator
  driftDetection:
    ignore:
      - paths: ["/metadata/labels/app.kubernetes.io~1name"]
        target:
          kind: VMServiceScrape
    mode: enabled
  install:
    crds: Skip
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    crds: Skip
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    crds:
      enabled: false
    fullnameOverride: victoria-operator
    operator:
      disable_prometheus_converter: false
      enable_converter_ownership: true
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true
        issuer:
          name: cluster-ca
          kind: ClusterIssuer
          group: cert-manager.io
    serviceMonitor:
      enabled: true
