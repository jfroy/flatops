---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  interval: 1h
  timeout: 5m
  releaseName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-operator
    namespace: flux-system
  values:
    resources:
      limits: null
    serviceMonitor:
      create: true
    web:
      config:
        baseURL: "https://flux.kantai.xyz"
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: "https://pid.kantai.xyz"
      httpRoute:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - flux.kantai.xyz
  valuesFrom:
    - kind: Secret
      name: flux-web-oidc
      valuesKey: client-id
      targetPath: web.config.authentication.oauth2.clientID
    - kind: Secret
      name: flux-web-oidc
      valuesKey: client-secret
      targetPath: web.config.authentication.oauth2.clientSecret
