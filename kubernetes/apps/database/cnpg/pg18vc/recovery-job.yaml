---
apiVersion: batch/v1
kind: Job
metadata:
  name: pg18vc-recovery
spec:
  template:
    spec:
      containers:
        - name: rclone
          image: docker.io/rclone/rclone:1.74.4@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1
          imagePullPolicy: IfNotPresent
          workingDir: /data
          args:
            - sync
            - "cloudflare:kantai-pg18vc"
            - "ceph:pg18vc"
          env:
            - name: RCLONE_VERBOSE
              value: "1"
            - name: RCLONE_CONFIG_CLOUDFLARE_TYPE
              value: "s3"
            - name: RCLONE_CONFIG_CLOUDFLARE_PROVIDER
              value: "Cloudflare"
            - name: RCLONE_CONFIG_CLOUDFLARE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: pg18vc-backup
                  key: ACCESS_KEY_ID
            - name: RCLONE_CONFIG_CLOUDFLARE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pg18vc-backup
                  key: SECRET_ACCESS_KEY
            - name: RCLONE_CONFIG_CLOUDFLARE_REGION
              value: "auto"
            - name: RCLONE_CONFIG_CLOUDFLARE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: pg18vc-backup
                  key: ENDPOINT
            - name: RCLONE_CONFIG_CLOUDFLARE_ACL
              value: "private"
            - name: RCLONE_CONFIG_CLOUDFLARE_NO_CHECK_BUCKET
              value: "true"
            - name: RCLONE_CONFIG_CEPH_TYPE
              value: "s3"
            - name: RCLONE_CONFIG_CEPH_PROVIDER
              value: "Ceph"
            - name: RCLONE_CONFIG_CEPH_ENV_AUTH
              value: "false"
            - name: RCLONE_CONFIG_CEPH_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: pg18vc-obc
                  key: AWS_ACCESS_KEY_ID
            - name: RCLONE_CONFIG_CEPH_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pg18vc-obc
                  key: AWS_SECRET_ACCESS_KEY
            - name: RCLONE_CONFIG_CEPH_ENDPOINT
              value: "https://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:443"
            - name: RCLONE_CONFIG_CEPH_CA_CERT
              value: /certs/ca-certificates.crt
          volumeMounts:
            - name: ca-certificates
              mountPath: /certs
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            seccompProfile: { type: RuntimeDefault }
      restartPolicy: OnFailure
      volumes:
        - name: ca-certificates
          configMap:
            name: cluster-ca-certificates.crt
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
