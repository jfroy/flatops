---
# LoadBalancer for virtual-host-style S3 from browsers on LAN/tailnet.
# Cilium BGP advertises the assigned IP; RGW terminates TLS with the
# *.s3.kantai.xyz cert. external-dns registers the bare s3.kantai.xyz at the
# assigned LB IP (it cannot emit wildcards) — the *.s3.kantai.xyz wildcard is
# a manual static record in UniFi (LAN) and Tailscale split-DNS (tailnet),
# both pointing at this LB IP. In-cluster apps do NOT use this path; they
# reach the RGW ClusterIP via the CoreDNS rewrite.
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-rgw-ceph-objectstore-lb
  annotations:
    external-dns.alpha.kubernetes.io/hostname: s3.kantai.xyz
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/bgp-control-plane
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app: rook-ceph-rgw
    rook_object_store: ceph-objectstore
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
