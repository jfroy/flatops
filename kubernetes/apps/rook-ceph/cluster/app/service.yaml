---
# LoadBalancer for virtual-host-style S3. Cilium BGP advertises a pinned IP
# (10.10.10.11); RGW terminates TLS with the *.s3.kantai.xyz cert. DNS for
# s3.kantai.xyz and the *.s3.kantai.xyz wildcard is published to Cloudflare
# (unproxied) via a DNSEndpoint. LAN resolve via upstream to Cloudflare;
# tailnet clients resolve via a split-DNS entry. UniFi cannot serve wildcards.
# In-cluster resolves via the CoreDNS rewrite.
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-rgw-ceph-objectstore-lb
  annotations:
    lbipam.cilium.io/ips: 10.10.10.11
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/bgp-control-plane
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app: rook-ceph-rgw
    rook_object_store: ceph-objectstore
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
