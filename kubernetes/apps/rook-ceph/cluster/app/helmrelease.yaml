---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  labels:
    kantai.xyz/no-hr-defaults: "true"
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  driftDetection:
    mode: disabled
  install:
    disableWait: true
  rollback:
    cleanupOnFail: true
  upgrade:
    cleanupOnFail: true
    disableWait: true
    strategy:
      name: RemediateOnFailure
    remediation:
      remediateLastFailure: true
      retries: 2
  values:
    cephImage:
      # renovate: datasource=docker depName=quay.io/ceph/ceph versioning=loose
      tag: v21.1.0
    cephClusterSpec:
      disruptionManagement:
        managePodBudgets: false
      annotations:
        # Avoid duplicate metrics from the ServiceMonitor and scrape annotations.
        # "If no mgr annotations are set, prometheus scrape annotations will be set by default."
        mgr:
          dummy: "true"
      cephConfig:
        global:
          bdev_enable_discard: "true"
          bdev_async_discard_threads: "1"
          osd_class_update_on_start: "false"
          osd_memory_target_autotune: "true"
          device_failure_prediction_mode: local
        mon:
          mon_max_pg_per_osd: "500"
        mgr:
          mgr/balancer/mode: upmap-read
      crashCollector:
        disable: true
      csi:
        readAffinity:
          enabled: true
      dashboard:
        enabled: true
        urlPrefix: /
        port: 8080
        ssl: false
      mgr:
        count: 2
        allowMultiplePerNode: true
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      mon:
        count: 3
        allowMultiplePerNode: true
      network:
        connections:
          # encryption:
          #   enabled: true
          # compression:
          #   enabled: true
          requireMsgr2: true
        ipFamily: IPv4
        # dualStack: true
      placement:
        all:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - kantai2
      resources:
        osd:
          limits:
            memory: 16Gi
          requests:
            memory: 16Gi
            cpu: "2"
      storage:
        useAllNodes: false
        useAllDevices: false
        config:
          osdsPerDevice: "1"
          encryptedDevice: "true"
        nodes:
          - name: kantai1
            devices:
              - name: /dev/disk/by-id/nvme-eui.000000000000000500a0750122eb5373
              - name: /dev/disk/by-id/nvme-eui.000000000000000100a07501243f60c5
              - name: /dev/disk/by-id/nvme-eui.000000000000000100a0750124a10bb6
    cephBlockPools:
      # https://github.com/rook/rook/blob/master/deploy/examples/pool-builtin-mgr.yaml
      - name: builtin-mgr
        spec:
          name: .mgr
          enableCrushUpdates: true
          failureDomain: osd
          replicated:
            size: 3
          parameters:
            compression_mode: none
        storageClass:
          enabled: false
        mirroring:
          enabled: false
      - name: ceph-blockpool
        spec:
          enableCrushUpdates: true
          failureDomain: osd
          replicated:
            size: 3
          parameters:
            compression_algorithm: lz4
            compression_mode: aggressive
        storageClass:
          allowedTopologies: []
          allowVolumeExpansion: true
          annotations: {}
          enabled: true
          isDefault: true
          labels: {}
          mountOptions: []
          name: ceph-block
          reclaimPolicy: Delete
          volumeBindingMode: "Immediate"
          parameters:
            imageFormat: "2"
            imageFeatures: layering,exclusive-lock,object-map,fast-diff,deep-flatten
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: ceph-block
      isDefault: false
      deletionPolicy: Delete
    cephFileSystems: []
    cephFileSystemVolumeSnapshotClass:
      enabled: false
    cephObjectStores:
      - name: ceph-objectstore
        spec:
          metadataPool:
            enableCrushUpdates: true
            failureDomain: osd
            replicated:
              size: 3
          dataPool:
            enableCrushUpdates: true
            failureDomain: osd
            erasureCoded:
              dataChunks: 2
              codingChunks: 1
            parameters:
              bulk: "true"
              compression_algorithm: lz4
              compression_mode: aggressive
          preservePoolsOnDelete: true
          gateway:
            annotations:
              secret.reloader.stakater.com/reload: xyz-kantai-s3-tls
            instances: 2
            priorityClassName: system-cluster-critical
            port: 80
            securePort: 443
            sslCertificateRef: xyz-kantai-s3-tls
          hosting:
            dnsNames:
              - s3.kantai.xyz
            advertiseEndpoint:
              dnsName: rgw.s3.kantai.xyz
              port: 443
              useTls: true
        storageClass:
          enabled: true
          name: ceph-bucket
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
          annotations: {}
          labels: {}
          parameters:
            region: us-west-1
            # endpoint: <hostname including port>
    monitoring:
      enabled: true
      createPrometheusRules: true
    route:
      dashboard:
        host:
          name: ceph.kantai.xyz
          path: "/"
          pathType: PathPrefix
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-internal
            namespace: network
    toolbox:
      enabled: true
