---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-collector-zfs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      scrutiny-collector-zfs:
        type: daemonset
        containers:
          collector:
            image:
              repository: ghcr.io/starosdev/scrutiny
              tag: 1.64.0-collector-zfs@sha256:5871d551d405f052817ba127c343689507583acb04d5b0596fa38709700a2be4
            env:
              COLLECTOR_ZFS_API_ENDPOINT: http://scrutiny.observability.svc.cluster.local:8080
              COLLECTOR_ZFS_CRON_SCHEDULE: "0 * * * *"
              COLLECTOR_ZFS_HOST_ID:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              COLLECTOR_ZFS_RUN_STARTUP: true
              TZ: America/Los_Angeles
            securityContext:
              privileged: true
              readOnlyRootFilesystem: false
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                          - amd64
    persistence:
      udev:
        type: hostPath
        hostPath: /run/udev
        hostPathType: Directory
        globalMounts:
          - path: /run/udev
            readOnly: true
