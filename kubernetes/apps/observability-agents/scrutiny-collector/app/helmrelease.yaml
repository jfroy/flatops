---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      scrutiny-collector:
        type: daemonset
        containers:
          collector:
            image:
              repository: ghcr.io/starosdev/scrutiny
              tag: 1.55.1-collector@sha256:27d45d7b3155dc32a572f7dbb42ceddaedc93962b0db2ed6e2f2db6ee9bf90da
            env:
              COLLECTOR_API_ENDPOINT: http://scrutiny.observability.svc.cluster.local:8080
              COLLECTOR_CRON_SCHEDULE: "0 * * * *"
              COLLECTOR_HOST_ID:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              COLLECTOR_RUN_STARTUP: true
              TZ: America/Los_Angeles
            securityContext:
              privileged: true
              readOnlyRootFilesystem: false
        pod:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
    persistence:
      collector-config:
        type: configMap
        name: scrutiny-collector-config
        globalMounts:
          - path: /opt/scrutiny/config/collector.yaml
            subPath: collector.yaml
            readOnly: true
      udev:
        type: hostPath
        hostPath: /run/udev
        hostPathType: Directory
        globalMounts:
          - path: /run/udev
            readOnly: true
