---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      scrutiny-collector:
        type: daemonset
        containers:
          collector:
            image:
              repository: ghcr.io/starosdev/scrutiny
              tag: 1.52.0-collector@sha256:de30252122acc80be9ed39961e48ed1213e1fc00a5115c3b7076d9fd909d3f13
            env:
              COLLECTOR_API_ENDPOINT: http://scrutiny.observability.svc.cluster.local:8080
              COLLECTOR_CRON_SCHEDULE: "0 * * * *"
              COLLECTOR_HOST_ID:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              COLLECTOR_RUN_STARTUP: true
              TZ: America/Los_Angeles
            securityContext:
              privileged: true
              readOnlyRootFilesystem: false
        pod:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
    persistence:
      collector-config:
        type: configMap
        name: scrutiny-collector-config
        globalMounts:
          - path: /opt/scrutiny/config/collector.yaml
            subPath: collector.yaml
            readOnly: true
      udev:
        type: hostPath
        hostPath: /run/udev
        hostPathType: Directory
        globalMounts:
          - path: /run/udev
            readOnly: true
