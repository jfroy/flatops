---
# yaml-language-server: $schema=https://crd.kantai.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vlagent
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/instance: kantai
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/observability-agents/vlagent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
