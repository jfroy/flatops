---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: renovate-secretstore
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: renovate-secretstore
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: renovate-secretstore
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: renovate-secretstore
subjects:
  - kind: ServiceAccount
    name: renovate-secretstore
    namespace: renovate
---
# yaml-language-server: $schema=https://crd.kantai.xyz/external-secrets.io/secretstore_v1.json
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes
spec:
  provider:
    kubernetes:
      remoteNamespace: renovate
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: renovate-secretstore
