---
# yaml-language-server: $schema=https://crd.kantai.xyz/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: renovate-operator
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.10.1
  url: oci://ghcr.io/mogenius/helm-charts/renovate-operator
---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  values:
    fullnameOverride: renovate-operator
    route:
      enabled: true
      hostnames:
        - renovate.kantai.xyz
      parentRefs:
        - name: envoy-external
          namespace: network
    webhook:
      enabled: true
    auth:
      github:
        enabled: true
        clientId: Iv23li6vvjqdgaiJgDNU
        existingSecret: renovate-operator-auth
        secretKey: client-secret
        sessionSecretKey: session-secret
        redirectUrl: https://renovate.kantai.xyz/auth/callback
    valkey:
      enabled: true
      auth:
        enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
