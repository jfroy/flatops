---
# yaml-language-server: $schema=https://crd.kantai.xyz/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: github-jfroy-bot
spec:
  provider:
    name: github
  discoveryFilters:
  - jfroy/*
  skipForks: true
  secretRef: github-jfroy-bot-auth-token
  # renovate: datasource=docker depName=ghcr.io/jfroy/renovate
  image: ghcr.io/jfroy/renovate:43.256.0@sha256:35b830e8871d437427ccbc4b2406cf6b1cb48cbf291696c153f217d985cabdfb
  schedule: 0,30 * * * *
  parallelism: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 1Gi
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: webhook-token
        key: token
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: >-
        [
          "^helm-docs( .*)?$",
          "^helm-schema( .*)?$"
        ]
    - name: RENOVATE_ALLOWED_UNSAFE_EXECUTIONS
      value: "mise"
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: docker-hub-token
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: docker-hub-token
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [
          {
            "hostType": "docker",
            "matchHost": "docker.io",
            "username": "$(DOCKERHUB_USERNAME)",
            "password": "$(DOCKERHUB_TOKEN)"
          }
        ]
