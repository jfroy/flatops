---
# yaml-language-server: $schema=https://crd.kantai.xyz/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
spec:
  interval: 1h
  url: https://charts.jetstack.io
---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: trust-manager
      version: v0.22.1
      sourceRef:
        kind: HelmRepository
        name: jetstack
  values:
    app:
      metrics:
        service:
          servicemonitor:
            enabled: true
            interval: 1m
    crds:
      enabled: true
      keep: true
    defaultPackageImage:
      repository: quay.io/jetstack/trust-pkg-debian-bookworm
      tag: "20230311.0"
    secretTargets:
      enabled: true
      authorizedSecrets:
        - cluster-ca-secret
        - operator-ca-tls-cluster-ca
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
