---
# yaml-language-server: $schema=https://crd.kantai.xyz/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: netbox
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 8.3.22
  url: oci://ghcr.io/netbox-community/netbox-chart/netbox
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: netbox
  values:
    commonAnnotations:
      reloader.stakater.com/auto: "true"
    superuser:
      name: jfroy
      email: jf@devklog.net
      # existingSecret: ?
    admins:
      - ["jfroy", "jf@devklog.net"]
    loginRequired: true
    storages:
      default:
        BACKEND: storages.backends.s3.S3Storage
        OPTIONS:
          bucket_name: netbox
          endpoint_url: https://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:443
          region_name: auto
          verify: /certs/ca-certificates.crt
    plugins: []
    preferIPv4: true
    releaseCheck:
      url: null
    timeZone: America/Los_Angeles
    persistence:
      enabled: true
      existingClaim: netbox
    initContainers:
      - name: init-db
        image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        envFrom:
          - secretRef:
              name: netbox-db
          - secretRef:
              name: netbox-initdb
    extraVolumes:
      - name: ca-certificates
        configMap:
          name: cluster-ca-certificates.crt
    extraVolumeMounts:
      - name: ca-certificates
        mountPath: /certs
        readOnly: true
    resourcesPreset: none
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    postgresql:
      enabled: false
    externalDatabase:
      host: pg18vc-rw.database.svc.cluster.local
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-db
      existingSecretKey: DB_PASSWORD
    valkey:
      enabled: true
      architecture: standalone
    housekeeping:
      enabled: false
    worker:
      enabled: false
  valuesFrom:
    - targetPath: storages.default.OPTIONS.access_key
      kind: Secret
      name: netbox-obc
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: storages.default.OPTIONS.secret_key
      kind: Secret
      name: netbox-obc
      valuesKey: AWS_SECRET_ACCESS_KEY
