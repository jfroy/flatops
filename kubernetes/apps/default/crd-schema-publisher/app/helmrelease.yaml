---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-schema-publisher
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: crd-schema-publisher
  values:
    serve:
      enabled: true
      port: 8081
      httpRoute:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - crd.kantai.xyz
    persistence:
      enabled: true
      size: 1Gi
    livenessProbe:
      httpGet:
        path: /healthz
        port: health
      initialDelaySeconds: 5
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /readyz
        port: health
      initialDelaySeconds: 3
      periodSeconds: 5
    metrics:
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    grafana:
      dashboard:
        operator:
          enabled: true
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
          defaultInstanceSelector:
            enabled: false
          allowCrossNamespaceImport: true
          datasources:
            - datasourceName: prometheus
              inputName: DS_PROMETHEUS
