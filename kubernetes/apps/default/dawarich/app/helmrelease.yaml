---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    configMaps:
      dawarich-initdb:
        data:
          dawarich.sql: |
            CREATE EXTENSION IF NOT EXISTS "postgis";
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          initdb:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: dawarich-db
              - secretRef:
                  name: dawarich-initdb
          sync-assets:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1
            command: [/bin/sh, -c, rm -rf /var/app/public/assets && cp -r /tmp/public_assets/* /var/app/public/]
            securityContext: &sc
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.4@sha256:8436e10bc65c94886a91d4415b6a6dfa9cb5a306fb3b996e5bb67cd2b4854193
            args:
              - --save
              - ""
              - --port
              - "6379"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
            restartPolicy: Always
            securityContext: *sc
        containers:
          app:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1
            command: ["web-entrypoint.sh"]
            args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
            env: &env
              APPLICATION_HOSTS: "{{ .Release.Name }}.kantai.xyz"
              APPLICATION_PROTOCOL: http
              DISTANCE_UNIT: km
              MIN_MINUTES_SPENT_IN_CITY: 60
              OIDC_ISSUER: https://pid.kantai.xyz
              OIDC_REDIRECT_URI: "https://{{ .Release.Name }}.kantai.xyz/users/auth/openid_connect/callback"
              PHOTON_API_HOST: photon.default.svc.cluster.local:2322
              PHOTON_API_USE_HTTPS: false
              RAILS_ENV: production
              REDIS_URL: redis://localhost:6379
              SELF_HOSTED: true
              TIME_ZONE: America/Los_Angeles
              TZ: America/Los_Angeles
            envFrom: &envFrom
              - secretRef:
                  name: dawarich
              - secretRef:
                  name: dawarich-db
              - secretRef:
                  name: dawarich-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  periodSeconds: 10
                  failureThreshold: 90
            securityContext: *sc
          sidekick:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1@sha256:a884f69f19ce0f66992f3872d24544d1e587e133b8a003e072711aafc1e02429
            command: ["sidekiq-entrypoint.sh"]
            args: []
            env: *env
            envFrom: *envFrom
            securityContext: *sc
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /var/app/public
                subPath: public
              - path: /var/app/storage
                subPath: storage
              - path: /dawarich_db_data
                subPath: dawarich_db_data
            sidekick: *mounts
            sync-assets:
              - path: /var/app/public
                subPath: public
      initdb:
        type: configMap
        identifier: dawarich-initdb
        advancedMounts:
          dawarich:
            initdb:
              - path: /initdb
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /tmp
                subPath: tmp
              - path: /var/app/tmp
                subPath: app
            sidekick: *mounts
            valkey:
              - path: /data
                subPath: valkey-data
      watched:
        type: emptyDir
        sizeLimit: 100Mi
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /var/app/tmp/imports/watched
            sidekick: *mounts
    route:
      dawarich:
        hostnames: ["{{ .Release.Name }}.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      dawarich:
        controller: dawarich
        ports:
          http:
            port: 3000
