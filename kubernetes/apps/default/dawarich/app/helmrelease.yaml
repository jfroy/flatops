---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    configMaps:
      dawarich-initdb:
        data:
          dawarich.sql: |
            CREATE EXTENSION IF NOT EXISTS "postgis";
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          initdb:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: dawarich-db
              - secretRef:
                  name: dawarich-initdb
          sync-assets:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.7.11
            command: [/bin/sh, -c, rm -rf /var/app/public/assets && cp -r /tmp/public_assets/* /var/app/public/]
            securityContext: &sc
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.1.0@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
            args:
              - --save
              - ""
              - --port
              - "6379"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
            restartPolicy: Always
            securityContext: *sc
        containers:
          app:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.7.11
            command: ["web-entrypoint.sh"]
            args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
            env: &env
              APPLICATION_HOSTS: "{{ .Release.Name }}.kantai.xyz"
              APPLICATION_PROTOCOL: http
              DISTANCE_UNIT: km
              MIN_MINUTES_SPENT_IN_CITY: 60
              OIDC_ISSUER: https://pid.kantai.xyz
              OIDC_REDIRECT_URI: "https://{{ .Release.Name }}.kantai.xyz/users/auth/openid_connect/callback"
              PHOTON_API_HOST: photon.default.svc.cluster.local:2322
              PHOTON_API_USE_HTTPS: false
              RAILS_ENV: production
              REDIS_URL: redis://localhost:6379
              SELF_HOSTED: true
              TIME_ZONE: America/Los_Angeles
              TZ: America/Los_Angeles
            envFrom: &envFrom
              - secretRef:
                  name: dawarich
              - secretRef:
                  name: dawarich-db
              - secretRef:
                  name: dawarich-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  periodSeconds: 10
                  failureThreshold: 90
            securityContext: *sc
          sidekick:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.7.11@sha256:531a649c7e96d5c182834b1628103d70f0d020d9285d2c9367d73f9e34164e1f
            command: ["sidekiq-entrypoint.sh"]
            args: []
            env: *env
            envFrom: *envFrom
            securityContext: *sc
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /var/app/public
                subPath: public
              - path: /var/app/storage
                subPath: storage
              - path: /dawarich_db_data
                subPath: dawarich_db_data
            sidekick: *mounts
            sync-assets:
              - path: /var/app/public
                subPath: public
      initdb:
        type: configMap
        identifier: dawarich-initdb
        advancedMounts:
          dawarich:
            initdb:
              - path: /initdb
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /tmp
                subPath: tmp
              - path: /var/app/tmp
                subPath: app
            sidekick: *mounts
            valkey:
              - path: /data
                subPath: valkey-data
      watched:
        type: emptyDir
        sizeLimit: 100Mi
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /var/app/tmp/imports/watched
            sidekick: *mounts
    route:
      dawarich:
        hostnames: ["{{ .Release.Name }}.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      dawarich:
        controller: dawarich
        ports:
          http:
            port: 3000
