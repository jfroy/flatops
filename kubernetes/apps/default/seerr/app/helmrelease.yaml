---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: seerr-chart
  values:
    fullnameOverride: seerr
    podAnnotations:
      reloader.stakater.com/auto: "true"
    securityContext:
      readOnlyRootFilesystem: true
    extraEnv:
      - name: TZ
        value: America/Los_Angeles
    extraEnvFrom:
      - secretRef:
          name: seerr
      - secretRef:
          name: seerr-db
    config:
      persistence:
        existingClaim: seerr
    volumes:
      - name: logs
        emptyDir:
          sizeLimit: 256Mi
      - name: next-cache
        emptyDir:
          sizeLimit: 1Gi
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 128Mi
    volumeMounts:
      - name: logs
        mountPath: /app/config/logs
      - name: next-cache
        mountPath: /app/.next/cache
      - name: tmp
        mountPath: /tmp
    route:
      main:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - seerr.kantai.xyz
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: init-db
                    image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
                    envFrom:
                      - secretRef:
                          name: seerr-db
                      - secretRef:
                          name: seerr-initdb
