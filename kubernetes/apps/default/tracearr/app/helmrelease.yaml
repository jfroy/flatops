---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    configMaps:
      tracearr-initdb:
        data:
          tracearr.sql: |
            CREATE EXTENSION IF NOT EXISTS "timescaledb";
    controllers:
      tracearr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          initdb:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: tracearr-db
              - secretRef:
                  name: tracearr-initdb
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.3@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
            args:
              - --save
              - ""
              - --port
              - "6379"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        containers:
          tracearr:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: 1.4.27@sha256:4802c793336ec2393de8db1088b0c8aa170c8b8b0aa7bba33a56a599c5d72544
            env:
              CORS_ORIGIN: "https://tracearr.kantai.xyz"
              HOST: "0.0.0.0"
              NODE_ENV: production
              PORT: &port 3000
              REDIS_URL: redis://localhost:6379
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: tracearr-db
              - secretRef:
                  name: tracearr-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
    persistence:
      initdb:
        type: configMap
        identifier: tracearr-initdb
        advancedMounts:
          tracearr:
            initdb:
              - path: /initdb
      tmp:
        type: emptyDir
        sizeLimit: 5Gi
        advancedMounts:
          tracearr:
            tracearr:
            - path: /app/data/image-cache
              subPath: image-cache
            - path: /tmp
              subPath: tmp
      valkey-data:
        type: emptyDir
        sizeLimit: 1Mi
        advancedMounts:
          tracearr:
            valkey:
              - path: /data
    route:
      tracearr:
        hostnames: ["tracearr.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      tracearr:
        controller: tracearr
        ports:
          http:
            port: *port
