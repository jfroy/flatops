---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    configMaps:
      tracearr-initdb:
        data:
          tracearr.sql: |
            CREATE EXTENSION IF NOT EXISTS "timescaledb";
    controllers:
      tracearr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          initdb:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: tracearr-db
              - secretRef:
                  name: tracearr-initdb
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.1.0@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
            args:
              - --save
              - ""
              - --port
              - "6379"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        containers:
          tracearr:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: 1.4.30@sha256:8a066964023e93b3f4ef90c85d1ecb13d37bd124e2387102c4d340098dce65ff
            env:
              CORS_ORIGIN: "https://tracearr.kantai.xyz"
              HOST: "0.0.0.0"
              NODE_ENV: production
              PORT: &port 3000
              REDIS_URL: redis://localhost:6379
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: tracearr-db
              - secretRef:
                  name: tracearr-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
    persistence:
      initdb:
        type: configMap
        identifier: tracearr-initdb
        advancedMounts:
          tracearr:
            initdb:
              - path: /initdb
      tmp:
        type: emptyDir
        sizeLimit: 5Gi
        advancedMounts:
          tracearr:
            tracearr:
            - path: /app/data/image-cache
              subPath: image-cache
            - path: /tmp
              subPath: tmp
      valkey-data:
        type: emptyDir
        sizeLimit: 1Mi
        advancedMounts:
          tracearr:
            valkey:
              - path: /data
    route:
      tracearr:
        hostnames: ["tracearr.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      tracearr:
        controller: tracearr
        ports:
          http:
            port: *port
