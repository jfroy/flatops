---
# yaml-language-server: $schema=https://crd.kantai.xyz/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: esphome-device-builder-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: esphome-device-builder-secrets
    template:
      data:
        secrets.yaml: |-
          {{- $secrets := dict }}
          {{- range $key, $value := . }}
          {{- $_ := set $secrets $key $value }}
          {{- end }}
          {{- $secrets | toYaml }}
  dataFrom:
    - extract:
        key: esphome-device-builder
