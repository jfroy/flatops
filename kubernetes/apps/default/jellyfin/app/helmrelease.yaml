---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          jellyfin:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.10@sha256:6497f0245de93fac642926c065b427362ca5e626e659f690516599c8c3817a38
            env:
              JELLYFIN_AutoDiscovery: "false"
              TZ: America/Los_Angeles
            ports:
              - containerPort: 8096
                name: http
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
            resources:
              limits:
                nvidia.com/gpu: 1
      vue:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          vue:
            image:
              repository: ghcr.io/jellyfin/jellyfin-vue
              tag: unstable.2026-05-18.e60a2ee@sha256:15789e83dca672d78c5537811e8174ee994718f9b6c67656679ba0a34edd3085
            command: ["nginx"]
            args: ["-g", "daemon off;"]
            env:
              TZ: America/Los_Angeles
            ports:
              - containerPort: 80
                name: http
            probes:
              liveness: &vue-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
              readiness: *vue-probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [44, 4000]
    persistence:
      cache:
        type: persistentVolumeClaim
        suffix: cache
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /cache
      config:
        existingClaim: ${APP}
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /config
      config-vue:
        type: configMap
        name: jellyfin-vue-config
        advancedMounts:
          vue:
            vue:
              - path: /usr/share/nginx/html/config.json
                subPath: config.json
                readOnly: true
      media2:
        type: persistentVolumeClaim
        existingClaim: media2
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /media2/library
                subPath: library
                readOnly: true
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
      tmp:
        type: emptyDir
        sizeLimit: 1Gi
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /tmp
                subPath: jellyfin
          vue:
            vue:
              - path: /tmp
                subPath: vue
              - path: /var/cache/nginx
                subPath: nginx
    route:
      jellyfin:
        hostnames:
          - "${APP_SUBDOMAIN:-${APP}}.kantai.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: jellyfin
                port: 8096
      vue:
        hostnames:
          - "jellyvue.kantai.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: jellyfin-vue
                port: 80
    service:
      jellyfin:
        controller: jellyfin
        ports:
          http:
            port: 8096
      vue:
        controller: vue
        ports:
          http:
            port: 80
    # TODO: enable metrics after upstream PR is merged and released
    # https://github.com/jellyfin/jellyfin/pull/14052
    # serviceMonitor:
    #   jellyfin:
    #     serviceName: jellyfin
    #     endpoints:
    #       - port: http
    #         path: /metrics
