---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          jellyfin:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.8@sha256:93227545077893cc9516f28b3adb733b67bc4691f41b6167428a2a0e3220b81c
            env:
              JELLYFIN_AutoDiscovery: "false"
              NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
              TZ: America/Los_Angeles
            ports:
              - containerPort: 8096
                name: http
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
            resources:
              limits:
                nvidia.com/gpu: 1
        pod:
          nodeSelector:
            nvidia.com/gpu.present: "true"
          runtimeClassName: nvidia
      vue:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          vue:
            image:
              repository: ghcr.io/jellyfin/jellyfin-vue
              tag: unstable.2026-05-13.af3ba28@sha256:22047b1cf505efd973c03aab0c9fb270255fd21bfa9819def9ff3a8bd7048acf
            env:
              DEFAULT_SERVERS: https://jellyfin.kantai.xyz
              DISABLE_SERVER_SELECTION: "true"
              TZ: America/Los_Angeles
            ports:
              - containerPort: 80
                name: http
            probes:
              liveness: &vue-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
              readiness: *vue-probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [44, 4000]
    persistence:
      cache:
        accessMode: ReadWriteOnce
        enabled: true
        retain: true
        size: 500Gi
        type: persistentVolumeClaim
        storageClass: ceph-block
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /cache
      config:
        existingClaim: ${APP}
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /config
      media2:
        type: persistentVolumeClaim
        existingClaim: media2
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /media2/library
                subPath: library
                readOnly: true
      tmp:
        type: emptyDir
        sizeLimit: 1Gi
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /tmp
      vue-cache:
        type: emptyDir
        sizeLimit: 1Gi
        advancedMounts:
          vue:
            vue:
              - path: /var/cache/nginx
      vue-run:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          vue:
            vue:
              - path: /run
    route:
      jellyfin:
        hostnames:
          - "${APP_SUBDOMAIN:-${APP}}.kantai.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: jellyfin
                port: 8096
      vue:
        hostnames:
          - "jellyvue.kantai.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: jellyfin-vue
                port: 80
    service:
      jellyfin:
        controller: jellyfin
        ports:
          http:
            port: 8096
      vue:
        controller: vue
        ports:
          http:
            port: 80
    # TODO: enable metrics after upstream PR is merged and released
    # https://github.com/jellyfin/jellyfin/pull/14052
    # serviceMonitor:
    #   jellyfin:
    #     serviceName: jellyfin
    #     endpoints:
    #       - port: http
    #         path: /metrics
