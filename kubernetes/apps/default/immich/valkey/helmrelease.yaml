---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-valkey
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      valkey:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.4@sha256:8436e10bc65c94886a91d4415b6a6dfa9cb5a306fb3b996e5bb67cd2b4854193
            args:
              - /config/valkey.conf
              - --save
              - ""
              - --tls-port
              - "6379"
              - --port
              - "0"
              - --tls-cert-file
              - /certs/tls.crt
              - --tls-key-file
              - /certs/tls.key
              - --tls-ca-cert-file
              - /certs/ca.crt
              - --tls-auth-clients
              - "no"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values: ["immich"]
                    topologyKey: kubernetes.io/hostname
                  weight: 100
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      certs:
        type: secret
        name: immich-valkey-tls
      config:
        type: secret
        name: immich-valkey
      data:
        type: emptyDir
        sizeLimit: 1Mi
    service:
      valkey:
        controller: valkey
        ports:
          http:
            port: 6379
