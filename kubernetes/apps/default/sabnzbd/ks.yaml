---
# yaml-language-server: $schema=https://crd.kantai.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sabnzbd
spec:
  components:
    - ../../../../components/envoy-gateway-oidc
    - ../../../../components/kopiur/backup
  path: ./kubernetes/apps/default/sabnzbd/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      APP_SUBDOMAIN: sab
      KOPIUR_CAPACITY: 1Gi
