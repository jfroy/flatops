---
# yaml-language-server: $schema=https://crd.kantai.xyz/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app changedetection
spec:
  components:
    - ../../../../components/kopiur/backup
  path: ./kubernetes/apps/default/changedetection/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      APP_SUBDOMAIN: cd
      KOPIUR_CAPACITY: 10Gi
      KOPIUR_UID: "999"
      KOPIUR_GID: "999"
