---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      shelfmark:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          shelfmark:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.2.3@sha256:bd6cb4bfa14a917e76945c22ed2c376d64cf7fdb74632435db713d42ca597b20
            command:
              - gunicorn
            args:
              # - --log-level=debug
              - --access-logfile=-
              - --error-logfile=-
              - --worker-class=geventwebsocket.gunicorn.workers.GeventWebSocketWorker
              - --workers=1
              - -t
              - "300"
              - -b
              - 0.0.0.0:8084
              - shelfmark.main:app
            env:
              AUTH_METHOD: oidc
              DOCKERMODE: "true"
              HIDE_LOCAL_AUTH: "true"
              INGEST_DIR: /books
              OIDC_ADMIN_GROUP: shelfmark-admins
              OIDC_BUTTON_LABEL: Pocket ID
              OIDC_CLIENT_ID: 770b8538-6b43-43d0-809e-8038cc1b9b31
              OIDC_DISCOVERY_URL: https://pid.kantai.xyz/.well-known/openid-configuration
              OIDC_USE_ADMIN_GROUP: "true"
              TZ: America/Los_Angeles
              # Redirect gunicorn's control socket out of $HOME/.gunicorn/
              # (read-only fs) and into the memory-backed /run volume.
              XDG_RUNTIME_DIR: /run
            envFrom:
              - secretRef:
                  name: shelfmark
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 8084
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
    persistence:
      config:
        existingClaim: "${APP}"
      media2:
        type: persistentVolumeClaim
        existingClaim: media2
        advancedMounts:
          shelfmark:
            shelfmark:
              - path: /books
                subPath: library/books/bookdrop
              - path: /media2/qbittorrent
                subPath: qbittorrent
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        globalMounts:
          - path: /run
      tmp:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /var/log
            subPath: var-log
    route:
      shelfmark:
        hostnames: ["shelfmark.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      shelfmark:
        controller: shelfmark
        ports:
          http:
            port: *port
