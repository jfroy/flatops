---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etampe
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      etampe:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          etampe:
            image:
              repository: ghcr.io/jfroy/etampe
              tag: 0.3.2@sha256:a7f24e0c7269fabc0a47d33830d293f846744a40aa31ab37c8471e5cb0fc0bb6
            envFrom:
              - secretRef:
                  name: etampe
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &httpPort 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *httpPort
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
    service:
      etampe:
        controller: etampe
        ports:
          smtp:
            port: 2525
          http:
            port: *httpPort
    serviceMonitor:
      etampe:
        serviceName: etampe
        endpoints:
          - port: http
            scheme: http
            path: /metrics
