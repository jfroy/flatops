---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: browserr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      browserr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          valkey:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.1.1@sha256:3acc0687f2a2e1091fae6450d7842dd658c941338cf0a873ddd9e14b9e4ea4dd
            args:
              - --save
              - ""
              - --port
              - "6379"
              - --bind
              - 127.0.0.1 -::1
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        containers:
          browserr:
            image:
              repository: ghcr.io/janpuc/browserr
              tag: 1.2.0@sha256:3ba025efc6dd515a7e1c5655bafb8e7ed571dd43f27daab135a9b8abb67522ce
            env:
              AUTH_MODE: seerr
              DEFAULT_REGION: US
              ENABLE_EMBEDDINGS: true
              ENABLE_RECOMMENDATIONS: true
              PORT: &port 3000
              REDIS_URL: redis://localhost:6379
              PUBLIC_URL: https://browserr.kantai.xyz
              SEERR_EXTERNAL_URL: https://seerr.kantai.xyz
              SEERR_INTERNAL_URL: http://seerr.default.svc.cluster.local
              SEERR_REQUEST_MODE: proxy
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: browserr
              - secretRef:
                  name: browserr-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /data
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/.next/cache
    route:
      browserr:
        hostnames:
          - "${APP_SUBDOMAIN:-${APP}}.kantai.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: browserr
                port: *port
    service:
      browserr:
        controller: browserr
        ports:
          http:
            port: *port
