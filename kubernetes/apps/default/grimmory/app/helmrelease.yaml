---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2.2-noble@sha256:e0236fc6386e7eacd9359e59d0a078bd7aa0d18280d36d13061121bedeaee903
            env:
              MARIADB_DATABASE: grimmory
              MARIADB_USER: grimmory
              MARIADB_PASSWORD: grimmory
              MARIADB_ROOT_PASSWORD: root
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mariadb-admin
                      - ping
                      - --socket=/run/mysqld/mysqld.sock
                      - --user=root
                      - --password=root
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
              # NOTE: io_uring is blocked by the default containerd v2 seccomp profile
              # https://github.com/containerd/containerd/pull/9320
              seccompProfile: { type: Unconfined }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
        containers:
          grimmory:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v3.0.3@sha256:a903a2b44c308bd1738b6f7cdb5a2e5a2a1ae23a092f30eb68581e2be1af50cd
            # Bypass /usr/local/bin/entrypoint.sh — it expects to start as root
            # to addgroup/adduser/chown before su-exec'ing down to USER_ID. With
            # pod-level runAsUser: 1000, that fails. Invoke java directly; the
            # JVM runs as UID 1000 from the start. JAVA_TOOL_OPTIONS is preserved
            # from the image ENV (Shenandoah GC, MaxRAMPercentage=60, etc.).
            command: ["java"]
            args:
              - "--enable-native-access=ALL-UNNAMED"
              - "--enable-preview"
              - "-jar"
              - /app/app.jar
            env:
              DATABASE_PASSWORD: grimmory
              DATABASE_URL: jdbc:mariadb://localhost:3306/grimmory
              DATABASE_USERNAME: grimmory
              TZ: America/Los_Angeles
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *port
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          labels:
            pod-security.kantai.xyz/allow-seccomp-unconfined: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: "${APP}"
        advancedMounts:
          grimmory:
            grimmory:
              - path: /app/data
                subPath: app
            mariadb:
              - path: /var/lib/mysql
                subPath: mysql
      media2:
        type: persistentVolumeClaim
        existingClaim: media2
        advancedMounts:
          grimmory:
            grimmory:
              - path: /books
                subPath: library/books
              - path: /bookdrop
                subPath: library/books/bookdrop
      mysqld:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          grimmory:
            mariadb:
              - path: /run/mysqld
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 256Mi
        advancedMounts:
          grimmory:
            grimmory:
              - path: /tmp
            mariadb:
              - path: /tmp
    route:
      grimmory:
        hostnames: ["grimmory.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      grimmory:
        controller: grimmory
        ports:
          http:
            port: *port
