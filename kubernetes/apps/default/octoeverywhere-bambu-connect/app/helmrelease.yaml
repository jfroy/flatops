---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: octoeverywhere-bambu-connect
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      octoeverywhere-bambu-connect:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          octoeverywhere-bambu-connect:
            image:
              repository: docker.io/octoeverywhere/octoeverywhere
              tag: 5.0.2@sha256:1a20ff4310eee08d13fffcef30af2fa86a466905f1bcb32410f1a246e201fe82
            env:
              COMPANION_MODE: bambu
              CONNECTION_MODE: local
              LAN_ONLY_MODE: "true"
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: octoeverywhere-bambu-connect
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: ${APP}
