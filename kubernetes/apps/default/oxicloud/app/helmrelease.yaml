---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oxicloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      oxicloud:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: oxicloud-db
              - secretRef:
                  name: oxicloud-initdb
        containers:
          oxicloud:
            image:
              repository: docker.io/diocrafts/oxicloud
              tag: 0.8.0@sha256:e371fe3cc0682fe0de09ede1fa88430e189fcf4bbb8645135b815f176c6602a6
            command: ["oxicloud"]
            env:
              OXICLOUD_BASE_URL: https://oxicloud.kantai.xyz
              OXICLOUD_ENABLE_AUTH: "true"
              OXICLOUD_ENABLE_FILE_SHARING: "true"
              OXICLOUD_ENABLE_SEARCH: "true"
              OXICLOUD_ENABLE_TRASH: "true"
              OXICLOUD_OIDC_ADMIN_GROUPS: "oxicloud-admins"
              OXICLOUD_OIDC_AUTO_PROVISION: "true"
              OXICLOUD_OIDC_DISABLE_PASSWORD_LOGIN: "true"
              OXICLOUD_OIDC_ENABLED: "true"
              OXICLOUD_OIDC_FRONTEND_URL: https://oxicloud.kantai.xyz
              OXICLOUD_OIDC_ISSUER_URL: https://pid.kantai.xyz
              OXICLOUD_OIDC_PROVIDER_NAME: Pocket ID
              OXICLOUD_OIDC_REDIRECT_URI: https://oxicloud.kantai.xyz/api/auth/oidc/callback
              OXICLOUD_OIDC_SCOPES: openid profile email groups
              OXICLOUD_S3_BUCKET: oxicloud
              OXICLOUD_S3_ENDPOINT_URL: https://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:443
              AWS_CA_BUNDLE: /certs/ca-certificates.crt
              OXICLOUD_S3_FORCE_PATH_STYLE: "true"
              OXICLOUD_S3_REGION: us-west-1
              OXICLOUD_SERVER_HOST: 0.0.0.0
              OXICLOUD_SERVER_PORT: &port 8086
              OXICLOUD_STORAGE_BACKEND: s3
              OXICLOUD_STORAGE_PATH: /data
              OXICLOUD_TRUST_PROXY_CIDR: 10.11.0.0/16
              OXICLOUD_WOPI_ENABLED: "false"
              OXICLOUD_OIDC_CLIENT_ID: 1519628e-f43f-42ff-94dd-29ca6b0ec862
              OXICLOUD_OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: oxicloud
                    key: OXICLOUD_OIDC_CLIENT_SECRET
              OXICLOUD_S3_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: oxicloud-obc
                    key: AWS_ACCESS_KEY_ID
              OXICLOUD_S3_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: oxicloud-obc
                    key: AWS_SECRET_ACCESS_KEY
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: oxicloud-db
              - secretRef:
                  name: oxicloud-keys
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
    persistence:
      ca-certificates:
        type: configMap
        name: cluster-ca-certificates.crt
        globalMounts:
          - path: /certs
      data:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 100Gi
      tmp:
        type: emptyDir
        sizeLimit: 1Gi
    route:
      oxicloud:
        hostnames: ["oxicloud.kantai.xyz"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      oxicloud:
        controller: oxicloud
        ports:
          http:
            port: *port
