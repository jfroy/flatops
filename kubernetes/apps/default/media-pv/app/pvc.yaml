---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media1
spec:
  accessModes:
    - ReadWriteOnce
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: zfs-static
  volumeMode: Filesystem
  volumeName: default-media1
---
