---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: default-media2
spec:
  capacity:
    storage: 246Ti
  accessModes:
    - ReadWriteOnce
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /var/mnt/reservoir/media2
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kantai1
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: default-media1
spec:
  capacity:
    storage: 246Ti
  accessModes:
    - ReadWriteOnce
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /var/mnt/reservoir/media1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kantai1
