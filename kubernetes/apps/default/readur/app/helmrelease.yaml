---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      readur:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: readur-db
              - secretRef:
                  name: readur-initdb
        containers:
          readur:
            image:
              repository: ghcr.io/readur/readur
              tag: 2.9.1@sha256:16aa8b1d7df218ab0f4fc57fbf890d125020fca416bc3555aa7731e7329020dc
            env:
              ALLOW_LOCAL_AUTH: false
              AUTO_CREATE_USERS: true
              RUST_LOG: debug
              RUST_BACKTRACE: "1"
              OCR_LANGUAGE: eng
              OIDC_AUTO_REGISTER: true
              OIDC_ENABLED: true
              OIDC_CLIENT_ID: 8dcfe9f6-0835-443a-86fd-c1adf74b0fd7
              OIDC_ISSUER_URL: https://pid.kantai.xyz
              OIDC_REDIRECT_URI: https://readur.kantai.xyz/api/auth/oidc/callback
              SECURE_COOKIES: true
              SERVER_ADDRESS: 0.0.0.0:8000
              S3_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: readur-s3-obc
                    key: AWS_ACCESS_KEY_ID
              S3_BUCKET_NAME: readur-s3
              S3_ENABLED: "true"
              S3_ENDPOINT_URL: https://s3.kantai.xyz
              S3_REGION: us-west-1
              S3_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: readur-s3-obc
                    key: AWS_SECRET_ACCESS_KEY
              SSL_CERT_FILE: /certs/ca-certificates.crt
              STORAGE_BACKEND: s3
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: readur
              - secretRef:
                  name: readur-db
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 8000
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      ca-certificates:
        type: configMap
        name: cluster-ca-certificates.crt
        globalMounts:
          - path: /certs
    route:
      readur:
        hostnames:
          - readur.kantai.xyz
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - port: *port
                name: readur
    service:
      readur:
        controller: readur
        type: ClusterIP
        ports:
          http:
            port: *port
