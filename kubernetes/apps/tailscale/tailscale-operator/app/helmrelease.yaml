---
# yaml-language-server: $schema=https://crd.kantai.xyz/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tailscale-operator
  valuesFrom:
    - kind: Secret
      name: k8s-operator-oauth-secret
      valuesKey: username
      targetPath: oauth.clientId
    - kind: Secret
      name: k8s-operator-oauth-secret
      valuesKey: credential
      targetPath: oauth.clientSecret
  values:
    operatorConfig:
      defaultTags:
        - "tag:k8s-operator-kantai"
      hostname: kantai
    proxyConfig:
      defaultTags: "tag:k8s-kantai"
    apiServerProxyConfig:
      mode: "true"
