---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: pss-restricted-additional
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:    [""]
        apiVersions:  ["v1"]
        operations:   ["CREATE","UPDATE"]
        resources:    ["pods"]
  validations:
    # Only these volume types are allowed
    - expression: >-
        object.spec.volumes == null ||
        object.spec.volumes.all(v,
          v.configMap             != null ||
          v.csi                   != null ||
          v.downwardAPI           != null ||
          v.emptyDir              != null ||
          v.ephemeral             != null ||
          v.persistentVolumeClaim != null ||
          v.projected             != null ||
          v.secret                != null
        )
      message: "Restricted policy: only configMap, csi, downwardAPI, emptyDir, ephemeral, persistentVolumeClaim, projected, or secret volumes are allowed"
    # Disallow privilege escalation
    - expression: >-
        object.spec.containers.all(c, c.securityContext.allowPrivilegeEscalation == false) &&
        object.spec.initContainers.all(c, c.securityContext.allowPrivilegeEscalation == false) &&
        object.spec.ephemeralContainers.all(c, c.securityContext.allowPrivilegeEscalation == false)
      message: "Restricted policy: allowPrivilegeEscalation must be false for all containers"
    # Require running as non-root
    - expression: >-
        (object.spec.securityContext.runAsNonRoot == true ||
         (
           object.spec.containers.all(c, c.securityContext.runAsNonRoot == true) &&
           object.spec.initContainers.all(c, c.securityContext.runAsNonRoot == true) &&
           object.spec.ephemeralContainers.all(c, c.securityContext.runAsNonRoot == true)
         )
        )
      message: "Restricted policy: runAsNonRoot must be true at pod or container level"
    # Disallow UID 0
    - expression: >-
        (object.spec.securityContext.runAsUser == null || object.spec.securityContext.runAsUser != 0) &&
        object.spec.containers.all(c, c.securityContext.runAsUser == null || c.securityContext.runAsUser != 0) &&
        object.spec.initContainers.all(c, c.securityContext.runAsUser == null || c.securityContext.runAsUser != 0) &&
        object.spec.ephemeralContainers.all(c, c.securityContext.runAsUser == null || c.securityContext.runAsUser != 0)
      message: "Restricted policy: runAsUser must not be set to 0"
    # Require an explicit seccomp profile
    - expression: >-
        object.spec.securityContext.seccompProfile.type in ["RuntimeDefault","Localhost"] ||
        (
          object.spec.containers.all(c, c.securityContext.seccompProfile.type in ["RuntimeDefault","Localhost"]) &&
          object.spec.initContainers.all(c, c.securityContext.seccompProfile.type in ["RuntimeDefault","Localhost"]) &&
          object.spec.ephemeralContainers.all(c, c.securityContext.seccompProfile.type in ["RuntimeDefault","Localhost"])
        )
      message: "Restricted policy: seccompProfile.type must be explicitly set to RuntimeDefault or Localhost"
    # Drop ALL capabilities and only add NET_BIND_SERVICE
    - expression: >-
        object.spec.containers.all(c,
          c.securityContext.capabilities.drop != null &&
          "ALL" in c.securityContext.capabilities.drop &&
          (c.securityContext.capabilities.add == null ||
           c.securityContext.capabilities.add.all(cap, cap == "NET_BIND_SERVICE"))
        ) &&
        object.spec.initContainers.all(c,
          c.securityContext.capabilities.drop != null &&
          "ALL" in c.securityContext.capabilities.drop &&
          (c.securityContext.capabilities.add == null ||
           c.securityContext.capabilities.add.all(cap, cap == "NET_BIND_SERVICE"))
        ) &&
        object.spec.ephemeralContainers.all(c,
          c.securityContext.capabilities.drop != null &&
          "ALL" in c.securityContext.capabilities.drop &&
          (c.securityContext.capabilities.add == null ||
           c.securityContext.capabilities.add.all(cap, cap == "NET_BIND_SERVICE"))
        )
      message: "Restricted policy: all containers must drop ALL capabilities and may only add NET_BIND_SERVICE"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: pss-restricted-additional-binding
spec:
  policyName: pss-restricted-additional
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: "pod-security.kubernetes.io/enforce"
          operator: In
          values: ["restricted"]
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE","UPDATE"]
        resources:   ["pods"]
